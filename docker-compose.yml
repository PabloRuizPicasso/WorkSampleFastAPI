services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db_test:
    image: postgres:16
    container_name: postgres_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fastapi_app
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/app_db
    volumes:
      - .:/app

  migrate:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      - db
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/app_db

  test:
    build: .
    container_name: fastapi_test
    depends_on:
      db_test:
        condition: service_healthy
    command: pytest tests/ --pdb
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db_test:5432/test_db
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db_test:5432/test_db
      PYTHONPATH: /app
    volumes:
      - .:/app


volumes:
  postgres_data: